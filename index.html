<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
      height: 70px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .clockin {
      background: #2ecc71;
      color: white;
    }

    .clockout {
      background: #e74c3c;
      color: white;
    }

    #gps {
      font-size: 14px;
      margin-bottom: 10px;
      color: #666;
    }

    .shift-group {
      margin-top: 15px;
    }

    .shift-option {
      display: flex;
      align-items: center;
      margin-top: 10px;
      font-size: 16px;
    }

    .shift-option input {
      margin: 0;
      margin-right: 12px;
      width: auto;
    }

    .shift-option span {
      display: inline-block;
    }

    .camera-box {
      position: relative;
      width: 100%;
      margin-top: 10px;
    }

    #camera,
    #selfieCanvas {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      background: black;
    }

    #camera {
      display: none;
    }

    #selfieCanvas {
      display: none;
    }

    .camera-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      gap: 15px;
    }

    .capture-btn {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    .selfie-start {
      background: #3498db;
    }

    .selfie-capture {
      background: #2ecc71;
    }

    .selfie-retake {
      background: #f39c12;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <h2>K5Tech Attendance</h2>

      <div id="gps">📍 Detecting GPS...</div>
      <div style="font-size:13px;color:#999;">Location required for attendance</div>

      <input id="employeeId" placeholder="Employee ID">
      <input id="site" placeholder="Site Name">
      <textarea id="notes" placeholder="Notes"></textarea>

      <h3>Selfie Verification</h3>

      <div class="camera-box">
        <video id="camera" autoplay playsinline></video>
        <canvas id="selfieCanvas"></canvas>

        <div class="camera-controls">
          <button type="button" id="selfieBtn" class="capture-btn selfie-start">
            📷 Take Selfie
          </button>
        </div>
      </div>

      <h3>Select Shift</h3>

      <div class="shift-group">
        <label class="shift-option">
          <input type="radio" name="shift" value="Day">
          <span>Day Shift</span>
        </label>

        <label class="shift-option">
          <input type="radio" name="shift" value="Night">
          <span>Night Shift</span>
        </label>
      </div>

      <h3>Attendance</h3>

      <button type="button" class="clockin" id="clockInBtn" onclick="submitAttendance('Clock-In')">Clock In</button>
      <button type="button" class="clockout" id="clockOutBtn" onclick="submitAttendance('Clock-Out')">Clock Out</button>

      <br><br>

    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwPcmaTBVwMTZH1tSP0qHF22rY0vK70zb-A8HlIC4-MgO1ikxTA3Spf8ks-xPbYJHmpJA/exec";

    let lat = "";
    let lng = "";

    let stream = null;
    let capturedImage = "";
    let cameraActive = false;
    let isSubmitting = false;

    const gpsEl = document.getElementById("gps");
    const video = document.getElementById("camera");
    const canvas = document.getElementById("selfieCanvas");
    const selfieBtn = document.getElementById("selfieBtn");
    const clockInBtn = document.getElementById("clockInBtn");
    const clockOutBtn = document.getElementById("clockOutBtn");

    // GPS
    navigator.geolocation.getCurrentPosition(
      function(pos) {
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;

        gpsEl.innerHTML = "📍 GPS: " + lat.toFixed(6) + ", " + lng.toFixed(6);
      },
      function(err) {
        console.error("GPS error:", err);
        gpsEl.innerHTML = "❌ GPS unavailable";
        Swal.fire("Location access is required for attendance. Please enable GPS/location permission.");
      },
      {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      }
    );

    async function startCamera() {
      if (cameraActive) return true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user"
          },
          audio: false
        });

        video.srcObject = stream;
        video.style.display = "block";
        canvas.style.display = "none";

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });

        await video.play();

        // Small delay so slower phones have time to render first good frame
        await new Promise(resolve => setTimeout(resolve, 300));

        cameraActive = true;
        return true;

      } catch (err) {
        console.error("Camera error:", err);
        Swal.fire("Unable to access camera. Please allow camera permission and try again.");
        return false;
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      cameraActive = false;
    }

    selfieBtn.onclick = async function () {
      const ctx = canvas.getContext("2d");

      if (!cameraActive) {
        const started = await startCamera();
        if (!started) return;

        selfieBtn.innerText = "📸 Capture";
        selfieBtn.classList.remove("selfie-start", "selfie-retake");
        selfieBtn.classList.add("selfie-capture");
        return;
      }

      if (cameraActive && !capturedImage) {
        if (
          !video.srcObject ||
          video.readyState < 2 ||
          !video.videoWidth ||
          !video.videoHeight
        ) {
          Swal.fire("Camera is still loading. Please wait a moment and try again.");
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        video.style.display = "none";
        canvas.style.display = "block";

        capturedImage = canvas.toDataURL("image/jpeg", 0.9);

        stopCamera();

        selfieBtn.innerText = "🔄 Retake Selfie";
        selfieBtn.classList.remove("selfie-capture");
        selfieBtn.classList.add("selfie-retake");
        return;
      }

      if (capturedImage) {
        capturedImage = "";
        canvas.style.display = "none";

        const started = await startCamera();
        if (!started) return;

        selfieBtn.innerText = "📸 Capture";
        selfieBtn.classList.remove("selfie-retake");
        selfieBtn.classList.add("selfie-capture");
      }
    };

    function clearForm() {
      document.getElementById("employeeId").value = "";
      document.getElementById("site").value = "";
      document.getElementById("notes").value = "";

      capturedImage = "";

      document.querySelectorAll('input[name="shift"]').forEach(r => {
        r.checked = false;
      });

      selfieBtn.innerText = "📷 Take Selfie";
      selfieBtn.classList.remove("selfie-capture", "selfie-retake");
      selfieBtn.classList.add("selfie-start");

      canvas.style.display = "none";
      video.style.display = "none";

      stopCamera();
    }

    function setSubmittingState(submitting) {
      isSubmitting = submitting;
      clockInBtn.disabled = submitting;
      clockOutBtn.disabled = submitting;
      selfieBtn.disabled = submitting;
    }

    function addWatermark(canvas, text) {
      const ctx = canvas.getContext("2d");

      ctx.font = "24px Arial";

      const paddingX = 10;
      const rectHeight = 40;
      const rectY = canvas.height - 50;

      ctx.fillStyle = "rgba(0,0,0,0.6)";
      ctx.fillRect(10, rectY, canvas.width - 20, rectHeight);

      ctx.fillStyle = "white";
      ctx.fillText(text, 20, canvas.height - 22);

      return canvas.toDataURL("image/jpeg", 0.9);
    }

    function submitAttendance(clockType) {
      if (isSubmitting) return;
      setSubmittingState(true);

      const emp = document.getElementById("employeeId").value.trim();
      const site = document.getElementById("site").value.trim();
      const notes = document.getElementById("notes").value.trim();
      const shift = document.querySelector('input[name="shift"]:checked')?.value;

      if (!emp) {
        setSubmittingState(false);
        Swal.fire("Enter Employee ID");
        return;
      }

      if (!shift) {
        setSubmittingState(false);
        Swal.fire("Please select a shift");
        return;
      }

    //   if (lat === "" || lng === "") {
    //     setSubmittingState(false);
    //     Swal.fire("Location not detected yet. Please allow GPS/location access and wait a moment.");
    //     return;
    //   }

      if (!capturedImage) {
        setSubmittingState(false);
        Swal.fire("Please capture selfie");
        return;
      }

      const watermark =
        emp + " | " +
        new Date().toLocaleString() + " | " +
        site;

      const finalImage = addWatermark(canvas, watermark);

      const action = clockType === "Clock-In" ? "Clocking In" : "Clocking Out";

      Swal.fire({
        title: emp + " " + action + "...",
        text: "Please wait",
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      const payload = {
        employeeId: emp,
        shift: shift,
        clockType: clockType,
        site: site,
        notes: notes,
        lat: lat,
        lng: lng,
        image: finalImage
      };

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(res => {
        setSubmittingState(false);

        if (res.status === "error") {
          Swal.fire(res.message);
          return;
        }

        Swal.fire({
          icon: "success",
          title: emp + " Attendance Saved",
          timer: 1500,
          showConfirmButton: false
        });

        clearForm();
      })
      .catch(err => {
        setSubmittingState(false);
        console.error("Submit error:", err);
        Swal.fire("Failed to save attendance. Please check your internet connection and try again.");
      });
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js").then(registration => {
        registration.addEventListener("updatefound", () => {
          const newWorker = registration.installing;

          newWorker.addEventListener("statechange", () => {
            if (
              newWorker.state === "installed" &&
              navigator.serviceWorker.controller
            ) {
              Swal.fire({
                icon: "info",
                title: "Update Available",
                text: "A new version of K5Tech Attendance is available.",
                confirmButtonText: "Update Now"
              }).then(() => {
                newWorker.postMessage({ action: "skipWaiting" });
              });
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener("controllerchange", () => {
        window.location.reload();
      });
    }
  </script>
</body>
</html>
