<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      resize: none;
      height: 70px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .clockin {
      background: #2ecc71;
      color: white;
    }

    .clockout {
      background: #e74c3c;
      color: white;
    }

    #gps {
      font-size: 14px;
      margin-bottom: 10px;
      color: #666;
    }

    .shift-group {
      margin-top: 15px;
    }

    .shift-option {
      display: flex;
      align-items: center;
      margin-top: 10px;
      font-size: 16px;
    }

    .shift-option input {
      margin: 0;
      margin-right: 12px;
      width: auto;
    }

    .shift-option span {
      display: inline-block;
    }

    .camera-box {
      position: relative;
      width: 100%;
      margin-top: 10px;
    }

    #camera,
    #selfieCanvas {
      width: 100%;
      border-radius: 12px;
      margin-top: 10px;
      background: black;
    }

    #camera {
      display: none;
    }

    #selfieCanvas {
      display: none;
    }

    .camera-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      gap: 15px;
    }

    .capture-btn {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }

    .selfie-start {
      background: #3498db;
    }

    .selfie-capture {
      background: #2ecc71;
    }

    .selfie-retake {
      background: #f39c12;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <h2>K5Tech Attendance</h2>

      <div id="gps">📍 Detecting GPS...</div>
      <div style="font-size:13px;color:#999;">Location required for attendance</div>

      <input id="employeeId" placeholder="Employee ID">
      <input id="site" placeholder="Site Name">
      <textarea id="notes" placeholder="Notes"></textarea>

      <h3>Selfie Verification</h3>

      <div class="camera-box">
        <video id="camera" autoplay playsinline></video>
        <canvas id="selfieCanvas"></canvas>

        <div class="camera-controls">
          <button type="button" id="selfieBtn" class="capture-btn selfie-start">
            📷 Take Selfie
          </button>
        </div>
      </div>

      <h3>Select Shift</h3>

      <div class="shift-group">
        <label class="shift-option">
          <input type="radio" name="shift" value="Day">
          <span>Day Shift</span>
        </label>

        <label class="shift-option">
          <input type="radio" name="shift" value="Night">
          <span>Night Shift</span>
        </label>
      </div>

      <h3>Attendance</h3>

      <button type="button" class="clockin" id="clockInBtn" onclick="submitAttendance('Clock-In')">Clock In</button>
      <button type="button" class="clockout" id="clockOutBtn" onclick="submitAttendance('Clock-Out')">Clock Out</button>

      <br><br>

    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbx5eEMfOFawDBzHNLS_vseenYbzynm8RTmbwMnnaYDCPIKANXjhuRbjinn9ZWkE0Tr3/exec";

  let lat = "";
  let lng = "";
  let resolvedAddress = "";

  let stream = null;
  let capturedImage = "";
  let cameraActive = false;
  let isSubmitting = false;

  const DB_NAME = "k5tech-attendance-db";
  const DB_VERSION = 1;
  const STORE_NAME = "pendingAttendance";

  const gpsEl = document.getElementById("gps");
  const video = document.getElementById("camera");
  const canvas = document.getElementById("selfieCanvas");
  const selfieBtn = document.getElementById("selfieBtn");
  const clockInBtn = document.getElementById("clockInBtn");
  const clockOutBtn = document.getElementById("clockOutBtn");

  // Add a small sync status line under GPS at runtime
  const syncEl = document.createElement("div");
  syncEl.id = "syncStatus";
  syncEl.style.fontSize = "13px";
  syncEl.style.color = "#666";
  syncEl.style.marginBottom = "10px";
  syncEl.innerText = navigator.onLine ? "🟢 Online" : "🟠 Offline";
  gpsEl.insertAdjacentElement("afterend", syncEl);

  function setSyncStatus(text, color) {
    syncEl.innerText = text;
    syncEl.style.color = color || "#666";
  }

  function openDb() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, DB_VERSION);

      request.onupgradeneeded = function(event) {
        const db = event.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: "recordId" });
        }
      };

      request.onsuccess = function() {
        resolve(request.result);
      };

      request.onerror = function() {
        reject(request.error);
      };
    });
  }

  async function savePendingSubmission(payload) {
    const db = await openDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.put(payload);

      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getPendingSubmissions() {
    const db = await openDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const request = store.getAll();

      request.onsuccess = () => {
        const items = request.result || [];
        items.sort((a, b) => new Date(a.clientTimestamp) - new Date(b.clientTimestamp));
        resolve(items);
      };

      request.onerror = () => reject(request.error);
    });
  }

  async function deletePendingSubmission(recordId) {
    const db = await openDb();

    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      store.delete(recordId);

      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }

  async function getPendingCount() {
    const items = await getPendingSubmissions();
    return items.length;
  }

  async function refreshPendingStatus() {
    const count = await getPendingCount();

    if (!navigator.onLine) {
      setSyncStatus(`🟠 Offline${count ? " • Pending sync: " + count : ""}`, "#b26a00");
      return;
    }

    if (count > 0) {
      setSyncStatus(`🟡 Online • Pending sync: ${count}`, "#9a7b00");
    } else {
      setSyncStatus("🟢 Online • All synced", "#2e7d32");
    }
  }

  function createRecordId() {
    return "att_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
  }

  function formatCoord(value) {
    return value === "" || value === null || value === undefined
      ? ""
      : Number(value).toFixed(6);
  }

  function getLocationText() {
    if (resolvedAddress) {
      return resolvedAddress.length > 60
        ? resolvedAddress.slice(0, 60) + "..."
        : resolvedAddress;
    }

    if (lat !== "" && lng !== "") {
      return `GPS: ${formatCoord(lat)}, ${formatCoord(lng)}`;
    }

    return "GPS unavailable";
  }

  function pad2(num) {
    return String(num).padStart(2, "0");
  }

  function getClientTimestampText() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = pad2(now.getMonth() + 1);
    const dd = pad2(now.getDate());
    const hh = pad2(now.getHours());
    const mi = pad2(now.getMinutes());
    const ss = pad2(now.getSeconds());

    return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
  }

  function getClientTimestampFile() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = pad2(now.getMonth() + 1);
    const dd = pad2(now.getDate());
    const hh = pad2(now.getHours());
    const mi = pad2(now.getMinutes());

    return `${yyyy}-${mm}-${dd}_${hh}-${mi}`;
  }

  function buildWatermarkLines(emp, site, timestampText) {
    const line1 = `${emp} | ${timestampText} | ${site || "-"}`;
    const line2 = getLocationText();
    return [line1, line2];
  }

  async function fetchAddressFromCoords(lat, lng) {
    try {
      const url = `${API_URL}?action=reverseGeocode&lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (data.status === "success" && data.address) {
        return data.address;
      }

      return "";
    } catch (err) {
      console.error("Address fetch error:", err);
      return "";
    }
  }

  // GPS
  navigator.geolocation.getCurrentPosition(
    async function(pos) {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;

      gpsEl.innerHTML = "📍 GPS: " + lat.toFixed(6) + ", " + lng.toFixed(6);

      resolvedAddress = await fetchAddressFromCoords(lat, lng);

      refreshPendingStatus();
    },
    function(err) {
      console.error("GPS error:", err);
      gpsEl.innerHTML = "❌ GPS unavailable";
      refreshPendingStatus();
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );

  async function startCamera() {
    if (cameraActive) return true;

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });

      video.srcObject = stream;
      video.style.display = "block";
      canvas.style.display = "none";

      await new Promise((resolve) => {
        video.onloadedmetadata = () => resolve();
      });

      await video.play();
      await new Promise(resolve => setTimeout(resolve, 300));

      cameraActive = true;
      return true;

    } catch (err) {
      console.error("Camera error:", err);
      Swal.fire("Unable to access camera. Please allow camera permission and try again.");
      return false;
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }

    video.srcObject = null;
    cameraActive = false;
  }

  selfieBtn.onclick = async function () {
    const ctx = canvas.getContext("2d");

    if (!cameraActive) {
      const started = await startCamera();
      if (!started) return;

      selfieBtn.innerText = "📸 Capture";
      selfieBtn.classList.remove("selfie-start", "selfie-retake");
      selfieBtn.classList.add("selfie-capture");
      return;
    }

    if (cameraActive && !capturedImage) {
      if (
        !video.srcObject ||
        video.readyState < 2 ||
        !video.videoWidth ||
        !video.videoHeight
      ) {
        Swal.fire("Camera is still loading. Please wait a moment and try again.");
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      video.style.display = "none";
      canvas.style.display = "block";

      capturedImage = canvas.toDataURL("image/jpeg", 0.9);

      stopCamera();

      selfieBtn.innerText = "🔄 Retake Selfie";
      selfieBtn.classList.remove("selfie-capture");
      selfieBtn.classList.add("selfie-retake");
      return;
    }

    if (capturedImage) {
      capturedImage = "";
      canvas.style.display = "none";

      const started = await startCamera();
      if (!started) return;

      selfieBtn.innerText = "📸 Capture";
      selfieBtn.classList.remove("selfie-retake");
      selfieBtn.classList.add("selfie-capture");
    }
  };

  function clearForm() {
    document.getElementById("employeeId").value = "";
    document.getElementById("site").value = "";
    document.getElementById("notes").value = "";

    capturedImage = "";

    document.querySelectorAll('input[name="shift"]').forEach(r => {
      r.checked = false;
    });

    selfieBtn.innerText = "📷 Take Selfie";
    selfieBtn.classList.remove("selfie-capture", "selfie-retake");
    selfieBtn.classList.add("selfie-start");

    canvas.style.display = "none";
    video.style.display = "none";

    stopCamera();
  }

  function setSubmittingState(submitting) {
    isSubmitting = submitting;
    clockInBtn.disabled = submitting;
    clockOutBtn.disabled = submitting;
    selfieBtn.disabled = submitting;
  }

  function addWatermark(canvas, lines) {
    const ctx = canvas.getContext("2d");
    const boxHeight = 80;
    const boxY = canvas.height - boxHeight - 10;

    ctx.fillStyle = "rgba(0,0,0,0.65)";
    ctx.fillRect(10, boxY, canvas.width - 20, boxHeight);

    ctx.fillStyle = "white";
    ctx.font = "22px Arial";
    ctx.fillText(lines[0], 20, boxY + 28);

    ctx.font = "18px Arial";
    ctx.fillText(lines[1], 20, boxY + 58);

    return canvas.toDataURL("image/jpeg", 0.9);
  }

  function buildPayload(clockType) {
    const emp = document.getElementById("employeeId").value.trim();
    const site = document.getElementById("site").value.trim();
    const notes = document.getElementById("notes").value.trim();
    const shift = document.querySelector('input[name="shift"]:checked')?.value;

    const clientTimestampText = getClientTimestampText();
    const clientTimestampFile = getClientTimestampFile();

    return {
      recordId: createRecordId(),
      clientTimestampText: clientTimestampText,
      clientTimestampFile: clientTimestampFile,
      employeeId: emp,
      shift: shift,
      clockType: clockType,
      site: site,
      notes: notes,
      lat: lat,
      lng: lng,
      address: resolvedAddress || "",
      image: addWatermark(canvas, buildWatermarkLines(emp, site, clientTimestampText))
    };
  }

  async function sendPayload(payload) {
    const response = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    return response.json();
  }

  async function syncPendingAttendance(showSuccessToast = false) {
    if (!navigator.onLine) {
      await refreshPendingStatus();
      return;
    }

    const pending = await getPendingSubmissions();

    if (!pending.length) {
      await refreshPendingStatus();
      return;
    }

    setSyncStatus(`🔄 Syncing ${pending.length} pending entr${pending.length === 1 ? "y" : "ies"}...`, "#1565c0");

    for (const item of pending) {
      try {
        const res = await sendPayload(item);

        if (res.status === "success") {
          await deletePendingSubmission(item.recordId);
          continue;
        }

        // Business-rule failures stay pending for manual review
        console.error("Pending sync blocked:", res.message);
        break;

      } catch (err) {
        console.error("Pending sync failed:", err);
        break;
      }
    }

    await refreshPendingStatus();

    if (showSuccessToast) {
      const count = await getPendingCount();
      if (count === 0) {
        Swal.fire({
          icon: "success",
          title: "Pending attendance synced",
          timer: 1200,
          showConfirmButton: false
        });
      }
    }
  }

  async function submitAttendance(clockType) {
    if (isSubmitting) return;
    setSubmittingState(true);

    const emp = document.getElementById("employeeId").value.trim();
    const shift = document.querySelector('input[name="shift"]:checked')?.value;

    if (!emp) {
      setSubmittingState(false);
      Swal.fire("Enter Employee ID");
      return;
    }

    if (!shift) {
      setSubmittingState(false);
      Swal.fire("Please select a shift");
      return;
    }

    if (!capturedImage) {
      setSubmittingState(false);
      Swal.fire("Please capture selfie");
      return;
    }

    const payload = buildPayload(clockType);
    const action = clockType === "Clock-In" ? "Clocking In" : "Clocking Out";

    Swal.fire({
      title: emp + " " + action + "...",
      text: "Please wait",
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    try {
      if (!navigator.onLine) {
        await savePendingSubmission(payload);
        setSubmittingState(false);
        clearForm();
        await refreshPendingStatus();

        Swal.fire({
          icon: "info",
          title: "Saved offline",
          text: "Attendance was saved on this device and will sync automatically when internet returns."
        });
        return;
      }

      const res = await sendPayload(payload);

      setSubmittingState(false);

      if (res.status === "error") {
        Swal.fire(res.message);
        return;
      }

      Swal.fire({
        icon: "success",
        title: emp + " Attendance Saved",
        timer: 1500,
        showConfirmButton: false
      });

      clearForm();
      await refreshPendingStatus();

    } catch (err) {
      console.error("Submit error:", err);

      try {
        await savePendingSubmission(payload);
        setSubmittingState(false);
        clearForm();
        await refreshPendingStatus();

        Swal.fire({
          icon: "warning",
          title: "Saved offline",
          text: "Upload failed, but attendance was saved on this device and will sync automatically later."
        });
      } catch (dbErr) {
        setSubmittingState(false);
        console.error("Offline save error:", dbErr);
        Swal.fire("Failed to save attendance. Please try again.");
      }
    }
  }

  window.addEventListener("online", () => {
    refreshPendingStatus();
    syncPendingAttendance(true);
  });

  window.addEventListener("offline", () => {
    refreshPendingStatus();
  });

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./service-worker.js").then(registration => {
      registration.addEventListener("updatefound", () => {
        const newWorker = registration.installing;

        newWorker.addEventListener("statechange", () => {
          if (
            newWorker.state === "installed" &&
            navigator.serviceWorker.controller
          ) {
            Swal.fire({
              icon: "info",
              title: "Update Available",
              text: "A new version of K5Tech Attendance is available.",
              confirmButtonText: "Update Now"
            }).then(() => {
              newWorker.postMessage({ action: "skipWaiting" });
            });
          }
        });
      });
    });

    navigator.serviceWorker.addEventListener("controllerchange", () => {
      window.location.reload();
    });
  }

  refreshPendingStatus();
  syncPendingAttendance();
</script>
</body>
</html>
