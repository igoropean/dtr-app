<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
text-align:center;
}

input, textarea{
width:100%;
padding:12px;
margin-top:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
resize:none;
height:70px;
}

button{
width:100%;
padding:18px;
font-size:18px;
margin-top:12px;
border:none;
border-radius:8px;
}

.clockin{
background:#2ecc71;
color:white;
}

.clockout{
background:#e74c3c;
color:white;
}

#gps{
font-size:14px;
margin-bottom:10px;
color:#666;
}

.shift-group{
margin-top:15px;
}

.shift-option{
display:flex;
align-items:center;
margin-top:10px;
font-size:16px;
}

.shift-option input{
margin:0;
margin-right:12px;
width:auto;
}

.shift-option span{
display:inline-block;
}

.camera-box{
position:relative;
width:100%;
margin-top:10px;
}

#camera{
width:100%;
border-radius:12px;
background:black;
}

#selfieCanvas{
display:none;
width:100%;
border-radius:12px;
}

.camera-controls{
display:flex;
justify-content:center;
align-items:center;
margin-top:10px;
gap:15px;
}

.capture-btn{
width:70px;
height:70px;
border-radius:50%;
border:6px solid white;
background:#3498db;
box-shadow:0 0 8px rgba(0,0,0,0.4);
}

.retake-btn{
padding:10px 20px;
border:none;
background:#f39c12;
color:white;
border-radius:8px;
font-size:16px;
}

</style>

</head>

<body>
<div class="container">
<div class="card">

<h2>K5Tech Attendance</h2>

<div id="gps">📍 Detecting GPS...</div>
<div style="font-size:13px;color:#999;">Location required for attendance</div>

<input id="employeeId" placeholder="Employee ID">

<input id="site" placeholder="Site Name">

<textarea id="notes" placeholder="Notes"></textarea>

<h3>Selfie Verification</h3>

<div class="camera-box">

    <video id="camera" autoplay playsinline></video>

    <canvas id="selfieCanvas"></canvas>

    <div class="camera-controls">

        <button id="captureBtn" class="capture-btn"></button>

        <button id="retakeBtn" class="retake-btn" style="display:none;">
        Retake
        </button>

    </div>

</div>

<h3>Select Shift</h3>

<div class="shift-group">

<label class="shift-option">
<input type="radio" name="shift" value="Day">
<span>Day Shift</span>
</label>

<label class="shift-option">
<input type="radio" name="shift" value="Night">
<span>Night Shift</span>
</label>

</div>

<h3>Attendance</h3>

<button class="clockin" onclick="submitAttendance('Clock-In')">Clock In</button>
<button class="clockout" onclick="submitAttendance('Clock-Out')">Clock Out</button>

<br><br>

<!-- <input type="file" accept="image/*" capture="user" id="photo"> -->

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxcqruOuRnBRYLxnWHkrtVFoTfKYW0eBKz8vl2_UTB-4z-Hn2ReVVqpnPft99gPl8pM9A/exec";

let lat="";
let lng="";

navigator.geolocation.getCurrentPosition(function(pos){

lat=pos.coords.latitude;
lng=pos.coords.longitude;

document.getElementById("gps").innerHTML =
"📍 GPS: "+lat.toFixed(6)+", "+lng.toFixed(6);

});

let stream;
let capturedImage="";

async function startCamera(){

stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"user"},
audio:false
});

document.getElementById("camera").srcObject = stream;

}

startCamera();

// CAPTURE SELFIE
document.getElementById("captureBtn").onclick=function(){

const video=document.getElementById("camera");
const canvas=document.getElementById("selfieCanvas");

const ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

video.style.display="none";
canvas.style.display="block";

capturedImage = canvas.toDataURL("image/jpeg");

stream.getTracks().forEach(track => track.stop());

document.getElementById("retakeBtn").style.display="inline-block";

};

//RETAKE BUTTON
document.getElementById("retakeBtn").onclick=function(){

document.getElementById("camera").style.display="block";
document.getElementById("selfieCanvas").style.display="none";

capturedImage="";

this.style.display="none";

};

function clearForm(){

document.getElementById("employeeId").value="";
document.getElementById("site").value="";
document.getElementById("notes").value="";
document.getElementById("photo").value="";

document.querySelectorAll('input[name="shift"]').forEach(r=>r.checked=false);

}

//APPLY WATERMARK TO CANVAS
function addWatermark(canvas,text){

const ctx=canvas.getContext("2d");

ctx.fillStyle="white";
ctx.font="28px Arial";

ctx.fillText(text,20,canvas.height-30);

return canvas.toDataURL("image/jpeg");

}

function submitAttendance(clockType){

const emp=document.getElementById("employeeId").value;
const site=document.getElementById("site").value;
const notes=document.getElementById("notes").value;

const shift=document.querySelector('input[name="shift"]:checked')?.value;

if(!emp){
Swal.fire("Enter Employee ID");
return;
}

if(!shift){
Swal.fire("Please select a shift");
return;
}

if(!capturedImage){
Swal.fire("Please capture selfie");
return;
}

const canvas=document.getElementById("selfieCanvas");

const watermark =
emp+" | "+
new Date().toLocaleString()+" | "+
site;

const finalImage = addWatermark(canvas, watermark);

let action = clockType === "Clock-In" ? "Clocking In" : "Clocking Out";

Swal.fire({
title: emp + " " + action + "...",
text: "Please wait",
allowOutsideClick:false,
didOpen:()=>{Swal.showLoading();}
});

const payload={

employeeId:emp,
shift:shift,
clockType:clockType,
site:site,
notes:notes,
lat:lat,
lng:lng,
image:finalImage

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(res=>res.json())
.then(res=>{

if(res.status==="error"){

Swal.fire(res.message);
return;

}

Swal.fire({
icon:"success",
title: emp + " Attendance Saved",
timer:1500,
showConfirmButton:false
});

clearForm();

});

}

</script>

</body>
</html>
