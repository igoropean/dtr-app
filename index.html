<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
font-family:Arial;
padding:20px;
text-align:center;
}

button{
width:100%;
padding:20px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:8px;
}

.shift-btn{
background:#3498db;
color:white;
}

.clockin{
background:#2ecc71;
color:white;
}

.clockout{
background:#e74c3c;
color:white;
}

.active{
box-shadow:0 0 10px #000 inset;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
}

#gps{
margin-top:10px;
font-size:14px;
color:#555;
}

</style>

</head>

<body>

<h2>Attendance</h2>

<div id="gps">📍 Detecting GPS...</div>

<input id="employeeId" placeholder="Employee ID">

<input id="site" placeholder="Site Name">

<textarea id="notes" placeholder="Notes"></textarea>

<h3>Select Shift</h3>

<button class="shift-btn" onclick="setShift('Day',this)">Day Shift</button>
<button class="shift-btn" onclick="setShift('Night',this)">Night Shift</button>

<h3>Attendance</h3>

<button class="clockin" onclick="submitAttendance('Clock-In')">Clock In</button>
<button class="clockout" onclick="submitAttendance('Clock-Out')">Clock Out</button>

<br><br>

<input type="file" accept="image/*" capture="user" id="photo">

<script>

const API_URL="https://script.google.com/macros/s/AKfycbywTBK2ybDapvyIA1APpL8tsvyjHB8MIgVz0O5mDjwWzRTaNH75aYlOYOL_qBoUATbthw/exec";

let shift="";
let lat="";
let lng="";

navigator.geolocation.getCurrentPosition(function(pos){

lat=pos.coords.latitude;
lng=pos.coords.longitude;

document.getElementById("gps").innerHTML =
"📍 GPS: "+lat.toFixed(6)+", "+lng.toFixed(6);

});

function setShift(value,btn){

shift=value;

document.querySelectorAll(".shift-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}

function clearForm(){

document.getElementById("employeeId").value="";
document.getElementById("site").value="";
document.getElementById("notes").value="";
document.getElementById("photo").value="";
shift="";

document.querySelectorAll(".shift-btn")
.forEach(b=>b.classList.remove("active"));

}

function submitAttendance(clockType){

const emp=document.getElementById("employeeId").value;
const site=document.getElementById("site").value;
const notes=document.getElementById("notes").value;

const file=document.getElementById("photo").files[0];

if(!emp){
Swal.fire("Enter Employee ID");
return;
}

if(!shift){
Swal.fire("Select Shift");
return;
}

if(!file){
Swal.fire("Take selfie first");
return;
}

Swal.fire({
title:"Saving Attendance...",
allowOutsideClick:false,
didOpen:()=>{Swal.showLoading();}
});

const reader=new FileReader();

reader.onload=function(){

const payload={

employeeId:emp,
shift:shift,
clockType:clockType,
site:site,
notes:notes,
lat:lat,
lng:lng,
image:reader.result

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})
.then(()=>{

Swal.fire({
icon:"success",
title:"Attendance Saved",
timer:1500,
showConfirmButton:false
});

clearForm();

});

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
