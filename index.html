<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f2f4f7;
margin:0;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
text-align:center;
}

input, textarea{
width:100%;
padding:12px;
margin-top:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
resize:none;
height:70px;
}

button{
width:100%;
padding:18px;
font-size:18px;
margin-top:12px;
border:none;
border-radius:8px;
}

.clockin{
background:#2ecc71;
color:white;
}

.clockout{
background:#e74c3c;
color:white;
}

#gps{
font-size:14px;
margin-bottom:10px;
color:#666;
}

.shift-group{
margin-top:15px;
text-align:left;
}

.shift-option{
display:flex;
align-items:center;
margin-top:6px;
font-size:16px;
}

.shift-option input{
margin-right:10px;
}

</style>

</head>

<body>
<div class="container">
<div class="card">

<h2>K5Tech Attendance</h2>

<div id="gps">📍 Detecting GPS...</div>

<input id="employeeId" placeholder="Employee ID">

<input id="site" placeholder="Site Name">

<textarea id="notes" placeholder="Notes"></textarea>

<h3>Select Shift</h3>

<div class="shift-group">

<label class="shift-option">
<input type="radio" name="shift" value="Day">
Day Shift
</label>

<label class="shift-option">
<input type="radio" name="shift" value="Night">
Night Shift
</label>

</div>

<h3>Attendance</h3>

<button class="clockin" onclick="submitAttendance('Clock-In')">Clock In</button>
<button class="clockout" onclick="submitAttendance('Clock-Out')">Clock Out</button>

<br><br>

<input type="file" accept="image/*" capture="user" id="photo">

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbywTBK2ybDapvyIA1APpL8tsvyjHB8MIgVz0O5mDjwWzRTaNH75aYlOYOL_qBoUATbthw/exec";

let shift="";
let lat="";
let lng="";

navigator.geolocation.getCurrentPosition(function(pos){

lat=pos.coords.latitude;
lng=pos.coords.longitude;

document.getElementById("gps").innerHTML =
"📍 GPS: "+lat.toFixed(6)+", "+lng.toFixed(6);

});

function setShift(value,btn){

shift=value;

document.querySelectorAll(".shift-btn")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}

function clearForm(){

document.getElementById("employeeId").value="";
document.getElementById("site").value="";
document.getElementById("notes").value="";
document.getElementById("photo").value="";
shift="";

document.querySelectorAll(".shift-btn")
.forEach(b=>b.classList.remove("active"));

}

function addWatermark(imageBase64, text){

return new Promise(resolve=>{

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText(text,20,img.height-40);

resolve(canvas.toDataURL("image/jpeg"));

};

img.src=imageBase64;

});

}

function submitAttendance(clockType){

const emp=document.getElementById("employeeId").value;
const site=document.getElementById("site").value;
const notes=document.getElementById("notes").value;

const file=document.getElementById("photo").files[0];

if(!emp){
Swal.fire("Enter Employee ID");
return;
}

const shift =
document.querySelector('input[name="shift"]:checked')?.value;

if(!shift){
Swal.fire("Please select a shift");
return;
}

if(!file){
Swal.fire("Take selfie first");
return;
}

Swal.fire({
title:"Saving Attendance...",
allowOutsideClick:false,
didOpen:()=>{Swal.showLoading();}
});

const reader=new FileReader();

reader.onload=function(){

const payload={

employeeId:emp,
shift:shift,
clockType:clockType,
site:site,
notes:notes,
lat:lat,
lng:lng,

const watermark =
emp + " | " +
new Date().toLocaleString() + " | " +
site;

addWatermark(reader.result,watermark).then(finalImage=>{

payload.image=finalImage;

fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

});


};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
})

.then(res=>res.json())
.then(res=>{

if(res.status==="error"){

Swal.fire(res.message);
return;

}

Swal.fire({
icon:"success",
title:"Attendance Saved",
timer:1500,
showConfirmButton:false
});

clearForm();

});

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
